version: '3.8'

services:
  backend:
    build: ./backend
    container_name: rib-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rib-frontend
    ports:
      - "3000:3000"
    restart: always

# Portainer removed as requested
